<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8"/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
		<title>Lesson 09: SVG and Animations</title>
		<!-- Standardizes default styles across different browsers -->
		<link rel="stylesheet" href="css/normalize.css"/>
		<!-- Main stylesheet -->
		<link rel="stylesheet" href="css/styles.css"/>
		<!-- Lato font -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
		<!-- Animate.css library for CSS animations -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
	</head>
	<body>
		<main>
			<!-- Collection section showcasing SVG images and animations -->
			<section class="collection">
				<h1 class="collection__title">SVG and Animations</h1>
				<!-- Card containera -->
				<div class="collection__cards">
					<!-- Card 1: Magnifying glass SVG image -->
					<div class="card">
						<div class="card__visual">
							<svg class="animate__animated animate__zoomIn" width="150" height="150">
								<use href="images/magnifying-glass.svg#magnifying-glass-img"></use>
								<title>Black outline depicting a magnifying glass with animation effect</title>
							</svg>
						</div>
					</div>
					<!-- Card 2: Royal crown SVG image -->
					<div class="card">
						<div class="card__visual">
							<!-- Rotal crown SVG image -->
							<svg class="crown" viewBox="0 0 550 550" width="150" height="150" xmlns="http://www.w3.org/2000/svg">
								<polygon class="crown-top" points="124,420 31,181 178,300 274,80 371,296 519,181 425,421" fill="none" stroke="black" stroke-width="25px" 
									stroke-linejoin="round"/>
								<line x1="125" y1="470" x2="426" y2="470" stroke="black" stroke-width="25px" stroke-linecap="round"/>
								<title>Black outline depicting a royal crown with hover animation effect</title>
							</svg>
						</div>
					</div>
					<!-- Card 3: UFO SVG image with animation -->
					<div class="card">
						<div class="card__visual">
							<!-- UFO SVG image -->
							<svg class="animate__animated animate__swing" viewBox="0 0 512 512" width="150" height="150" stroke="black" stroke-width="15px" stroke-linecap="round" fill="none" xmlns="http://www.w3.org/2000/svg">
								<!-- Top dome -->
								<path class="ufo__dome ufo__dome--top" d="M 365, 140 C 328, 20 181, 20 152, 143"/>
								<path class="ufo__dome ufo__dome--base" d="M 153, 144 C 186, 174 332, 174 365, 140"/>

								<!-- Disc -->
								<path class="ufo__disc ufo__disc--start" d="M 156, 126 C 41, 130 -3, 197 155, 236"/>
								<path class="ufo__disc ufo__disc--center" d="M 155, 236 C 189, 245 290, 257 359, 238"/>
								<path class="ufo__disc ufo__disc--end" d="M 358, 119 C 503, 143 484, 199 359, 238"/>

								<!-- Headlights -->
								<line class="ufo__headlight ufo__headlight--left" x1="99" y1="158" x2="125" y2="186"/>
								<line class="ufo__headlight ufo__headlight--center-left" x1="149" y1="191" x2="194" y2="205"/>
								<line class="ufo__headlight ufo__headlight--center" x1="234" y1="209" x2="278" y2="209"/>
								<line class="ufo__headlight ufo__headlight--center-right" x1="318" y1="204" x2="363" y2="192"/>
								<line class="ufo__headlight ufo__headlight--right" x1="386" y1="186" x2="414" y2="159"/>

								<!-- Bottom dome -->
								<path class="ufo__dome ufo__dome--bottom" d="M 190, 244 C 213, 280 288, 284 320, 246"/>

								<!-- Light beams -->
								<line class="ufo__beam ufo__beam--left" x1="105" y1="395" x2="153" y2="272"/>
								<line class="ufo__beam ufo__beam--center-left" x1="147" y1="446" x2="195" y2="303"/>
								<line class="ufo__beam ufo__beam--center" x1="256" y1="468" x2="256" y2="324"/>
								<line class="ufo__beam ufo__beam--center-right" x1="365" y1="446" x2="316" y2="303"/>
								<line class="ufo__beam ufo__beam--right" x1="407" y1="395" x2="359" y2="272"/>

								<title>Black outline depicting a UFO with animated glowing light beams</title>
							</svg>
						</div>
					</div>
					<!-- Card 4: Galaxy SVG image with animation -->
					<div class="card">
						<div class="card__visual">
							<svg class="galaxy" width="150" height="150">
								<use href="images/galaxy.svg#galaxy-img"></use>
								<title>Black outline depicting a spinning galaxy with gradient effect</title>
							</svg>
						</div>
					</div>
				</div>	
			</section>
		</main>
	</body>
</html>
